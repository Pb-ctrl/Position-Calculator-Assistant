<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 仓位计算助手 (离线高级版)</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --red: #ef4444;
            --green: #10b981;
            --yellow: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background-color: var(--card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.25rem;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        /* 结果展示区样式 */
        .result-header {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .result-table th, .result-table td {
            padding: 10px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .result-table th {
            background-color: #f9fafb;
            color: var(--text-muted);
            font-weight: 500;
            width: 42%;
        }

        .result-table tr.highlight {
            background-color: #eff6ff;
            font-weight: bold;
        }

        .risks {
            background-color: #fef2f2;
            border-left: 4px solid var(--red);
            padding: 15px;
            border-radius: 0 6px 6px 0;
            font-size: 0.9rem;
        }

        .risks.pass {
            background-color: #f0fdf4;
            border-left-color: var(--green);
        }

        .risks.warn {
            background-color: #fffbeb;
            border-left-color: var(--yellow);
        }

        .risk-item {
            margin-bottom: 5px;
        }
        .risk-item:last-child {
            margin-bottom: 0;
        }

        .hidden {
            display: none;
        }

        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <!-- 左侧：输入区 -->
    <div class="card">
        <h2>📝 交易参数输入</h2>
        
        <div class="two-col">
            <div class="form-group">
                <label>交易所</label>
                <select id="exchange">
                    <option value="Binance">Binance (币安)</option>
                    <option value="OKX">OKX (欧易)</option>
                    <option value="Bitget">Bitget</option>
                    <option value="Bybit">Bybit</option>
                </select>
            </div>
            <div class="form-group">
                <label>标的/币种</label>
                <input type="text" id="coin" placeholder="例如: BTC" value="BTC">
            </div>
        </div>

        <div class="form-group">
            <label>账户总额 (USDT)</label>
            <input type="number" id="balance" placeholder="例如: 10000" step="any">
        </div>

        <div class="two-col">
            <div class="form-group">
                <label>开仓价格</label>
                <input type="number" id="entry" placeholder="例如: 68000" step="any">
            </div>
            <div class="form-group">
                <label>杠杆倍数 (1=现货)</label>
                <input type="number" id="leverage" value="1" min="1" step="any">
            </div>
        </div>

        <div class="two-col">
            <div class="form-group">
                <label>止损价格</label>
                <input type="number" id="sl" placeholder="必须填" step="any">
            </div>
            <div class="form-group">
                <label>止盈价格</label>
                <input type="number" id="tp" placeholder="必须填" step="any">
            </div>
        </div>
        
        <!-- ⬇️ 新增：选择挂单还是吃单 -->
        <div class="two-col">
            <div class="form-group">
                <label>开仓方式</label>
                <select id="orderType">
                    <option value="taker">市价单 (Taker 吃单)</option>
                    <option value="maker">限价单 (Maker 挂单)</option>
                </select>
            </div>
            <div class="form-group">
                <label>单笔亏损占比 (%)</label>
                <input type="number" id="risk" value="1" step="0.1" title="止损后最多亏本金的百分比">
            </div>
        </div>

        <button onclick="calculate()">🚀 一键计算仓位</button>
    </div>

    <!-- 右侧：结果区 -->
    <div class="card">
        <h2>📊 仓位计算结果</h2>
        
        <div id="welcome-msg" style="color: var(--text-muted); text-align: center; padding: 40px 0;">
            填写左侧参数并点击计算，结果将显示在这里。
        </div>

        <div id="result-content" class="hidden">
            <div id="result-header" class="result-header">
                方向：<span id="out-direction"></span> | 标的：<span id="out-coin"></span><br>
                <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: normal;">
                    <span id="out-exchange"></span>（<span id="out-type"></span>）| 开仓费率 <span id="out-entry-fee"></span>% / 止损费率 <span id="out-exit-fee"></span>%
                </span>
            </div>

            <table class="result-table">
                <tbody>
                    <tr><th>账户总额</th><td id="out-balance"></td></tr>
                    <tr><th>止损后允许最大亏损</th><td id="out-risk-amount"></td></tr>
                    <tr><th>开仓价格</th><td id="out-entry"></td></tr>
                    <tr><th>止损价格</th><td id="out-sl"></td></tr>
                    <tr><th>止盈价格</th><td id="out-tp"></td></tr>
                    <tr><th>K线止损距离</th><td id="out-sl-dist"></td></tr>
                    <tr><th>预估手续费(开仓+平仓)</th><td id="out-fee-cost"></td></tr>
                    <tr><th>实际止损总成本</th><td id="out-actual-sl"></td></tr>
                    <tr><th>杠杆倍数</th><td id="out-leverage"></td></tr>
                    <tr class="highlight"><th>名义仓位 (开多大的单)</th><td id="out-nominal"></td></tr>
                    <tr class="highlight"><th>保证金 (实际占用资金)</th><td id="out-margin"></td></tr>
                    <tr class="highlight"><th>可买入数量</th><td id="out-qty"></td></tr>
                    <tr><th>预期盈利</th><td id="out-profit"></td></tr>
                    <tr class="highlight"><th>盈亏比</th><td id="out-rr"></td></tr>
                    <tr><th>保证金占用占比</th><td id="out-margin-ratio"></td></tr>
                </tbody>
            </table>

            <div id="risk-box" class="risks">
                <strong style="display:block;margin-bottom:8px;">⚠️ 风险检查：</strong>
                <div id="risk-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⬇️ 核心费率表（包含 Taker 吃单 和 Maker 挂单 费率）
    const feeRates = {
        'Binance': { 
            spot: { taker: 0.00100, maker: 0.00100 },
            // 完美匹配截图数据：吃单0.04%，挂单0%
            futures: { taker: 0.00040, maker: 0.00000 } 
        },
        'OKX': { 
            spot: { taker: 0.00100, maker: 0.00080 },
            futures: { taker: 0.00050, maker: 0.00020 } 
        },
        'Bitget': { 
            spot: { taker: 0.00100, maker: 0.00100 },
            futures: { taker: 0.00060, maker: 0.00020 } 
        },
        'Bybit': { 
            spot: { taker: 0.00100, maker: 0.00100 },
            futures: { taker: 0.00055, maker: 0.00020 } 
        }
    };

    function formatNum(num, decimals = 2) {
        return Number(num).toFixed(decimals);
    }

    function calculate() {
        // 获取输入值
        const exchange = document.getElementById('exchange').value;
        const coin = document.getElementById('coin').value.toUpperCase() || '未知标的';
        const balance = parseFloat(document.getElementById('balance').value);
        const entry = parseFloat(document.getElementById('entry').value);
        const sl = parseFloat(document.getElementById('sl').value);
        const tp = parseFloat(document.getElementById('tp').value);
        const leverage = parseFloat(document.getElementById('leverage').value) || 1;
        const riskPct = parseFloat(document.getElementById('risk').value) || 1;
        const orderType = document.getElementById('orderType').value; // 'taker' 或 'maker'

        // 基础验证
        if (!balance || !entry || !sl || !tp) {
            alert('请填写完整的账户总额、开仓、止损、止盈价格！');
            return;
        }

        // 第1步：判断方向
        let direction = '';
        let dirIcon = '';
        let dirColor = '';
        
        if (sl < entry) {
            direction = '做多';
            dirIcon = '▲';
            dirColor = 'text-green';
        } else if (sl > entry) {
            direction = '做空';
            dirIcon = '▼';
            dirColor = 'text-red';
        } else {
            alert('止损价格不能等于开仓价格！');
            return;
        }

        // 第2步：计算纯K线层面的止损距离
        let slDist = direction === '做多' ? (entry - sl) / entry : (sl - entry) / entry;

        // 第3步：最大允许亏损金额
        let maxLoss = balance * (riskPct / 100);

        // 第4步：手续费精算 🌟
        let isFutures = leverage > 1;
        let tradeCategory = isFutures ? 'futures' : 'spot';
        let tradeTypeStr = isFutures ? '合约' : '现货';
        
        // 获取当前交易所对应 Maker 和 Taker 费率
        let takerRate = feeRates[exchange][tradeCategory].taker;
        let makerRate = feeRates[exchange][tradeCategory].maker;

        // 开仓费率（取决于用户选择市价还是限价）
        let entryFeeRate = orderType === 'taker' ? takerRate : makerRate;
        // 止损费率（止损必定是触发市价单，强制按 Taker 算最安全）
        let exitFeeRate = takerRate; 
        
        let feeCost = entryFeeRate + exitFeeRate; 
        
        // 实际的亏损百分比 = K线跌幅 + 两次手续费
        let actualSlCost = slDist + feeCost;

        // 第5步：算名义仓位
        let nominalPos = maxLoss / actualSlCost;

        // 第6步：算保证金
        let margin = nominalPos / leverage;

        // 第7步：算可买入数量
        let qty = nominalPos / entry;
        let qtyDecimals = coin.includes('BTC') ? 4 : (coin.includes('ETH') ? 3 : 2);

        // 第8步：算止盈距离
        let tpDist = direction === '做多' ? (tp - entry) / entry : (entry - tp) / entry;

        // 第9步：算预期盈利 (用开仓手续费+假设平仓也是taker费率扣除)
        let expProfit = (nominalPos * tpDist) - (nominalPos * feeCost);

        // 第10步：算盈亏比
        let rr = expProfit / maxLoss;
        let marginRatio = (margin / balance) * 100;

        // 风险检查
        let risks = [];
        let riskLevel = 'pass'; 

        if (margin > balance) {
            risks.push('❌ 保证金超出账户余额，无法开仓。请减小单笔亏损占比或增加杠杆(不建议)。');
            riskLevel = 'fail';
        }
        if (margin > balance * 0.3) {
            risks.push('⚠️ 保证金占用超30%，仓位偏重，注意爆仓风险。');
            if (riskLevel === 'pass') riskLevel = 'warn';
        }
        if (rr < 1) {
            risks.push('⚠️ 盈亏比不足 1:1，冒着大风险赚小钱，建议调整入场位。');
            if (riskLevel === 'pass') riskLevel = 'warn';
        }
        if (slDist < feeCost) {
            risks.push('❌ 止损距离小于手续费成本，刚开仓就等于亏损，请扩大止损空间。');
            riskLevel = 'fail';
        }
        if (leverage > 20) {
            risks.push('⚠️ 当前为高杠杆交易，极易出现插针强平，请确认承受能力。');
            if (riskLevel === 'pass') riskLevel = 'warn';
        }
        if ((direction === '做多' && tp < entry) || (direction === '做空' && tp > entry)) {
            risks.push('❌ 止盈方向填写错误，请检查。');
            riskLevel = 'fail';
        }
        if (risks.length === 0) {
            risks.push('✅ 所有风险指标良好，可以考虑开仓。');
        }

        // --- 渲染前端结果 ---
        document.getElementById('welcome-msg').classList.add('hidden');
        document.getElementById('result-content').classList.remove('hidden');

        document.getElementById('out-direction').className = dirColor;
        document.getElementById('out-direction').innerText = `${direction} ${dirIcon}`;
        document.getElementById('out-coin').innerText = coin;
        
        document.getElementById('out-exchange').innerText = exchange;
        document.getElementById('out-type').innerText = tradeTypeStr;
        document.getElementById('out-entry-fee').innerText = formatNum(entryFeeRate * 100, 4);
        document.getElementById('out-exit-fee').innerText = formatNum(exitFeeRate * 100, 4);

        document.getElementById('out-balance').innerText = `${formatNum(balance)} USDT`;
        document.getElementById('out-risk-amount').innerText = `${formatNum(riskPct, 2)}% （触发止损将亏损 ${formatNum(maxLoss)} USDT）`;
        document.getElementById('out-entry').innerText = formatNum(entry);
        document.getElementById('out-sl').innerText = formatNum(sl);
        document.getElementById('out-tp').innerText = formatNum(tp);
        
        document.getElementById('out-sl-dist').innerText = `${formatNum(slDist * 100, 4)}%`;
        
        // 显示手续费明细
        document.getElementById('out-fee-cost').innerText = `${formatNum(feeCost * 100, 4)}% (开 ${formatNum(entryFeeRate*100, 4)}% + 平 ${formatNum(exitFeeRate*100, 4)}%)`;
        document.getElementById('out-actual-sl').innerText = `${formatNum(actualSlCost * 100, 4)}%`;
        
        document.getElementById('out-leverage').innerText = `${leverage}x`;
        document.getElementById('out-nominal').innerText = `${formatNum(nominalPos)} USDT`;
        document.getElementById('out-margin').innerText = `${formatNum(margin)} USDT`;
        document.getElementById('out-qty').innerText = `${formatNum(qty, qtyDecimals)} ${coin}`;
        
        document.getElementById('out-profit').innerText = `${formatNum(expProfit)} USDT`;
        document.getElementById('out-rr').innerText = `${formatNum(rr, 1)} : 1`;
        document.getElementById('out-margin-ratio').innerText = `${formatNum(marginRatio, 2)}%`;

        let riskBox = document.getElementById('risk-box');
        riskBox.className = 'risks ' + riskLevel;
        document.getElementById('risk-list').innerHTML = risks.map(r => `<div class="risk-item">${r}</div>`).join('');
    }
</script>

</body>
</html>
